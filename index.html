<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Tanvi ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff4d6d,#ff85a2,#ffc2d1,#ff4d6d);
background-size:400% 400%;
animation:bg 10s infinite;
}

@keyframes bg{
0%{background-position:0 50%;}
50%{background-position:100% 50%;}
100%{background-position:0 50%;}
}

.container{
text-align:center;
color:white;
z-index:5;
}

h1{
font-size:50px;
text-shadow:3px 3px 10px black;
margin-bottom:30px;
animation:zoom 1s infinite alternate;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.05);}
}

button{
padding:15px 35px;
font-size:22px;
border:none;
border-radius:40px;
cursor:pointer;
margin:15px;
font-weight:bold;
transition:.3s;
}

#yes{
background:#00c853;
color:white;
box-shadow:0 0 20px lime;
}

#yes:hover{
transform:scale(1.1);
}

#no{
background:#d50000;
color:white;
position:absolute;
}

#result{
display:none;
}

#result h2{
font-size:55px;
color:yellow;
text-shadow:2px 2px 10px black;
margin-bottom:20px;
}

.heart{
position:absolute;
font-size:25px;
animation:float linear infinite;
pointer-events:none;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-120px);
opacity:0;
}
}

.confetti{
position:absolute;
width:12px;
height:12px;
background:white;
animation:fall 3s linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-20px) rotate(0deg);
}
100%{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}
}
</style>
</head>

<body>

<div class="container">

<div id="question">

<h1>❤️ TANVI ❤️<br>Will You Be My Valentine?</h1>

<button id="yes">YES ❤️</button>

<button id="no">NO 💔</button>

</div>

<div id="result">

<h2>I KNEW YOU LOVE ME ❤️</h2>

<img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif" width="250">

</div>

</div>

<script>

const no=document.getElementById("no");

function move(){

let x=Math.random()*(window.innerWidth-120);

let y=Math.random()*(window.innerHeight-70);

no.style.left=x+"px";
no.style.top=y+"px";

}

no.addEventListener("mouseover",move);
no.addEventListener("touchstart",move);

function heart(){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=(Math.random()*3+3)+"s";

h.style.fontSize=(20+Math.random()*25)+"px";

document.body.appendChild(h);

setTimeout(()=>h.remove(),6000);

}

setInterval(heart,200);

document.getElementById("yes").onclick=function(){

document.getElementById("question").style.display="none";

document.getElementById("result").style.display="block";

for(let i=0;i<250;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background="hsl("+Math.random()*360+",100%,50%)";

c.style.animationDuration=(2+Math.random()*2)+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),4000);

}

};

</script>

</body>
</html>
